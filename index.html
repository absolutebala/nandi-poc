<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nandi Foundation — Material POC</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #ffffff;
        color: #1a1a1a;
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100vh; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Shown ONLY when printing is attempted — hidden at all other times -->
    <div id="nandi-print-block" style="display:none">
      <div style="font-size:64px">🔒</div>
      <h1 style="font-size:28px;font-weight:700;color:#1a1a1a">
        Files are secured and protected
      </h1>
      <p style="font-size:18px;color:#534AB7;font-weight:500">
        to transfer in any forms.
      </p>
      <p style="font-size:13px;color:#aaa;max-width:400px">
        Printing Nandi Foundation training materials is not permitted.
      </p>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
